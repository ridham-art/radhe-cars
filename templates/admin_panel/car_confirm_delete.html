{% extends "admin_panel/base.html" %}
{% block title %}Delete car{% endblock %}
{% block heading %}Delete car{% endblock %}
{% block content %}
<div class="bg-white rounded-xl border border-slate-200 p-6 max-w-lg">
    <p class="text-slate-700 mb-4">Delete <strong>{{ object.title }}</strong>? This cannot be undone.</p>
    <form method="post" class="flex flex-wrap gap-2 items-center">
        {% csrf_token %}
        {% if return_to_sell %}<input type="hidden" name="return" value="sell">{% endif %}
        <button type="submit" class="inline-flex items-center px-4 py-2 bg-red-600 text-white text-sm font-medium rounded-lg border border-red-700 shadow-sm hover:bg-red-700">Delete</button>
        <a href="{{ cancel_url }}" class="ap-btn ap-btn-neutral">Cancel</a>
    </form>
</div>
{% endblock %}
